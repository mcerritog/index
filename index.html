<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Inventario Lubricantes</title>

<style>
body { font-family: Arial; padding: 10px; }
table { border-collapse: collapse; width: 100%; font-size: 12px; }
th, td { border: 1px solid #ccc; padding: 4px; text-align: center; }
th { background: #f2f2f2; }
input { width: 50px; text-align: center; }
button { margin-top: 10px; padding: 10px; }
.total { font-weight: bold; background: #e6ffe6; }
</style>
</head>

<body>

<h3>📊 Inventario de Lubricantes</h3>

Estación: <input type="text" id="estacion"><br><br>

<table id="tabla">
<thead>
<tr>
<th>Producto</th>
<th>Bodega</th>
<th>1</th>
<th>2</th>
<th>3</th>
<th>4</th>
<th>A</th>
<th>B</th>
<th>Total</th>
</tr>
</thead>
<tbody></tbody>
</table>

<button onclick="guardar()">Guardar</button>
<button onclick="exportar()">Exportar Excel</button>

<script>

// 🔥 🔴 PEGA AQUÍ TODOS TUS PRODUCTOS EXACTOS DEL EXCEL
const productos = [
"LIMPIA PARABRISAS FULL PRO 200 ML","LIMPIA PARABRISAS FULLPRO .946 ML","DIRECCION HIDRAULICA 200 ML","LIQUIDO DE FRENOS 200 ML","ANTICONGELANTE IDEAL .946 ML","ANTICONGELANTE  IDEAL 3.79 ML","ANTICONGELANTE  OPTIMA .946 ML","ANTICONGELANTE  OPTIMA 3.79 L","QS SERIES III SAE 50 .946 ML","QS SERIES III SAE 50 5 LT","QS MAX VISCOSIDAD SAE 25W/50 CF4 .946 ML","QS MAX VISCOSIDAD SEA 25W/50 CF4 5 LT","HELIX HX3 HM25W60 SL_A1W9","HELIX HX5 SN 20W50 _A1W9","HHELIX HX7 SN 10W40 SN_A1W9","HLX HX7 SN PLUS 10W30 SN_LATA","HLX HX8 PRO AG5W30 DEX1_LATA","FULL PRO ARRANCADOR SPRAY 400 ML","QS ALTO KILOMETRAJE SAE 15W40 API SN","QS DEXTRONATF III","QS LIMPIADOR DE INYECTORES (XTREME GAS)","QS POWER RIDER 2T J-FB","QS SERIES III SAE 40","QS RACING MULT. SAE 20W50","QS HD SAE 40","ADVANCE AX 5 MOTOS 20 .946 ML","SHELL ADVAN 4TUL MOTOS SAE 15W-50 SN","BIDON UREA ULTRA BLUE 20 LTS",

];

// Crear tabla
function crearTabla() {
    let tbody = document.querySelector("#tabla tbody");
    tbody.innerHTML = "";

    productos.forEach((p, i) => {
        let fila = `<tr>
            <td>${p}</td>
            ${[0,1,2,3,4,5,6].map(col => 
                `<td><input type="number" data-row="${i}" class="val"></td>`
            ).join("")}
            <td class="total" id="total-${i}">0</td>
        </tr>`;
        tbody.innerHTML += fila;
    });

    document.querySelectorAll(".val").forEach(input => {
        input.addEventListener("input", calcularFila);
    });
}

// Calcular total por fila
function calcularFila() {
    let row = this.dataset.row;
    let inputs = document.querySelectorAll(`input[data-row='${row}']`);
    let suma = 0;

    inputs.forEach(i => suma += Number(i.value) || 0);

    document.getElementById(`total-${row}`).innerText = suma;
}

// Guardar
function guardar() {
    let estacion = document.getElementById("estacion").value;
    if (!estacion) return alert("Ingresa estación");

    let datos = [];

    productos.forEach((p, i) => {
        let inputs = document.querySelectorAll(`input[data-row='${i}']`);
        let valores = Array.from(inputs).map(i => Number(i.value) || 0);
        let total = valores.reduce((a,b)=>a+b,0);

        datos.push({
            producto: p,
            valores: valores,
            total: total
        });
    });

    let registro = {
        fecha: new Date().toLocaleString(),
        estacion: estacion,
        datos: datos
    };

    let registros = JSON.parse(localStorage.getItem("invLub") || "[]");
    registros.push(registro);
    localStorage.setItem("invLub", JSON.stringify(registros));

    alert("Guardado correctamente");
}

// Exportar
function exportar() {
    let registros = JSON.parse(localStorage.getItem("invLub") || "[]");

    let csv = "Fecha,Estación,Producto,Bodega,1,2,3,4,A,B,Total\n";

    registros.forEach(r => {
        r.datos.forEach(d => {
            csv += `${r.fecha},${r.estacion},${d.producto},${d.valores.join(",")},${d.total}\n`;
        });
    });

    let blob = new Blob([csv], {type:"text/csv"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "inventario_lubricantes.csv";
    a.click();
}

document.addEventListener("DOMContentLoaded", function() {
    crearTabla();
});

</script>

</body>
</html>
