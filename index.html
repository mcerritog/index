<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventario Lubricantes</title>

<style>
body { font-family: Arial; margin: 0; padding: 10px; background:#f5f5f5;}
header { background:#0d47a1; color:white; padding:15px; text-align:center; font-size:18px;}
table { border-collapse: collapse; width: 100%; background:white; }
th, td { border: 1px solid #ccc; padding: 6px; text-align: center; }
th { background: #1976d2; color:white; }

input[type=number] {
    width: 55px;
    height: 35px;
    font-size: 14px;
    text-align: center;
}

button {
    width:32%;
    padding:12px;
    margin:5px 1%;
    font-size:14px;
}

.total { font-weight: bold; background: #e8f5e9; }
</style>
</head>

<body>

<header>📊 Inventario de Lubricantes</header>

Estación: <input type="text" id="estacion"><br><br>

<table id="tabla">
<thead>
<tr>
<th>Producto</th>
<th>Bodega</th>
<th>1</th>
<th>2</th>
<th>3</th>
<th>4</th>
<th>A</th>
<th>B</th>
<th>Total</th>
</tr>
</thead>
<tbody></tbody>
</table>

<button onclick="guardar()">💾 Guardar</button>
<button onclick="exportar()">📤 Exportar</button>
<button onclick="enviarCorreo()">📧 Enviar</button>

<script>

// 🔥 PRODUCTOS
const productos = [
"LIMPIA PARABRISAS FULL PRO 200 ML","LIMPIA PARABRISAS FULLPRO .946 ML","DIRECCION HIDRAULICA 200 ML","LIQUIDO DE FRENOS 200 ML","ANTICONGELANTE IDEAL .946 ML","ANTICONGELANTE IDEAL 3.79 ML","ANTICONGELANTE OPTIMA .946 ML","ANTICONGELANTE OPTIMA 3.79 L","QS SERIES III SAE 50 .946 ML","QS SERIES III SAE 50 5 LT","QS MAX VISCOSIDAD SAE 25W/50 CF4 .946 ML","QS MAX VISCOSIDAD 25W/50 CF4 5 LT","HELIX HX3 25W60","HELIX HX5 20W50","HELIX HX7 10W40","HELIX HX7 10W30","HELIX HX8 5W30","ARRANCADOR SPRAY","QS 15W40 SN","QS DEXTRON III","LIMPIADOR INYECTORES","ACEITE 2T","QS SAE 40","QS 20W50","QS HD SAE 40","ADVANCE AX5","ADVANCE 15W50","UREA 20L"
];

// 🔥 CREAR TABLA
function crearTabla() {
    let tbody = document.querySelector("#tabla tbody");
    tbody.innerHTML = "";

    productos.forEach((p, i) => {
        let fila = `<tr>
            <td>${p}</td>
            ${[0,1,2,3,4,5,6].map((col) =>
                `<td><input type="number" data-row="${i}" data-col="${col}" class="val" step="1"></td>`
            ).join("")}
            <td class="total" id="total-${i}">0</td>
        </tr>`;
        tbody.innerHTML += fila;
    });

    document.querySelectorAll(".val").forEach(input => {
        input.addEventListener("input", function() {
            calcularFila.call(this);
            guardarTemporal();
        });
    });
}

// 🔥 CALCULAR
function calcularFila() {
    let row = this.dataset.row;
    let inputs = document.querySelectorAll(`input[data-row='${row}']`);
    let suma = 0;
    inputs.forEach(i => suma += Number(i.value) || 0);
    document.getElementById(`total-${row}`).innerText = suma;
}

// 🔥 AUTOGUARDADO
function guardarTemporal() {
    let datos = [];

    productos.forEach((p, i) => {
        let inputs = document.querySelectorAll(`input[data-row='${i}']`);
        let valores = Array.from(inputs).map(i => i.value || "");
        datos.push(valores);
    });

    localStorage.setItem("capturaTemporal", JSON.stringify(datos));
}

// 🔥 CARGAR AUTOGUARDADO
function cargarTemporal() {
    let datos = JSON.parse(localStorage.getItem("capturaTemporal") || "[]");

    datos.forEach((fila, i) => {
        fila.forEach((valor, j) => {
            let input = document.querySelectorAll(`input[data-row='${i}']`)[j];
            if (input) input.value = valor;
        });
    });

    document.querySelectorAll(".val").forEach(input => {
        input.dispatchEvent(new Event("input"));
    });
}

// 💾 GUARDAR DEFINITIVO
function guardar() {
    let estacion = document.getElementById("estacion").value;
    if (!estacion) return alert("Ingresa estación");

    let registro = {
        fecha: new Date().toLocaleString(),
        estacion: estacion,
        productos: []
    };

    productos.forEach((p, i) => {
        let inputs = document.querySelectorAll(`input[data-row='${i}']`);
        let valores = Array.from(inputs).map(i => Number(i.value) || 0);
        let total = valores.reduce((a,b)=>a+b,0);

        registro.productos.push({ producto: p, valores: valores, total: total });
    });

    let historial = JSON.parse(localStorage.getItem("inventarios") || "[]");
    historial.push(registro);
    localStorage.setItem("inventarios", JSON.stringify(historial));

    localStorage.removeItem("capturaTemporal");

    alert("Guardado correctamente ✔");
}

// 📤 EXPORTAR
function exportar() {
    let historial = JSON.parse(localStorage.getItem("inventarios") || "[]");

    let csv = "Fecha,Estación,Producto,Bodega,1,2,3,4,A,B,Total\n";

    historial.forEach(r => {
        r.productos.forEach(p => {
            csv += `${r.fecha},${r.estacion},${p.producto},${p.valores.join(",")},${p.total}\n`;
        });
    });

    let blob = new Blob([csv], {type:"text/csv"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "inventario.csv";
    a.click();
}

// 📧 CORREO
function enviarCorreo() {
    let historial = JSON.parse(localStorage.getItem("inventarios") || "[]");
    if (historial.length === 0) return alert("No hay datos");

    let ultimo = historial[historial.length - 1];

    let cuerpo = `Inventario ${ultimo.estacion}%0D%0A${ultimo.fecha}%0D%0A%0D%0A`;

    ultimo.productos.forEach(p => {
        cuerpo += `${p.producto}: ${p.total}%0D%0A`;
    });

    window.location.href = `mailto:?subject=Inventario ${ultimo.estacion}&body=${cuerpo}`;
}

// 🔥 NAVEGACIÓN VERTICAL
document.addEventListener("keydown", function(e) {

    let current = document.activeElement;
    if (!current.classList.contains("val")) return;

    let row = parseInt(current.dataset.row);
    let col = parseInt(current.dataset.col);

    if (e.key === "Enter" || e.key === "ArrowDown") {
        e.preventDefault();
        let next = document.querySelector(`input[data-row='${row + 1}'][data-col='${col}']`);
        if (next) next.focus();
    }

    if (e.key === "ArrowUp") {
        e.preventDefault();
        let prev = document.querySelector(`input[data-row='${row - 1}'][data-col='${col}']`);
        if (prev) prev.focus();
    }

});

// 🔥 INICIO
document.addEventListener("DOMContentLoaded", function() {
    crearTabla();
    cargarTemporal();
});

</script>

</body>
</html>
